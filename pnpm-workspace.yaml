  expo-blur: ~55.0.9
  expo-calendar: ~55.0.7
  expo-camera: ~55.0.18
  expo-contacts: ~55.0.14
  expo-file-system: ~55.0.17
  expo-haptics: ~55.0.14
  expo-image: ~55.0.10
  expo-image-picker: ~55.0.19
  expo-linear-gradient: ~55.0.8
  expo-media-library: ~55.0.15
  expo-notifications: ~55.0.23
  expo-router: 55.0.5
  expo-video: 55.0.5
  nativewind: ^4.2.3
  oxlint: ^1.60.0
  react: 19.2.0
  react-dom: 19.2.0
